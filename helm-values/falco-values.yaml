# ==============================================================================
# Falco Helm Values — Kubernetes Security Operations Center
# ==============================================================================

# Use modern_ebpf driver (ebpf is removed in Falco chart v9.x)
driver:
  kind: modern_ebpf

# Falco configuration
falco:
  json_output: true
  log_stderr: true
  log_syslog: false
  priority: notice

  # Load our custom rules (note: rules_files plural, rules_file is deprecated)
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/falco_rules.local.yaml
    - /etc/falco/rules.d

# Mount custom rules via ConfigMap
customRules:
  custom-rules.yaml: |-
    # Custom rules are loaded from the falco/custom-rules.yaml file
    # and injected here via the deploy script as a ConfigMap

# Export metrics via falcosidekick for Prometheus
falcosidekick:
  enabled: true
  listenPort: ""
  webui:
    enabled: false

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Tolerations to run on all nodes
tolerations:
  - effect: NoSchedule
    operator: Exists
